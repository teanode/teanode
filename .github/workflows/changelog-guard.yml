name: Changelog Guard

on:
  pull_request:
    branches:
      - main
    types: [opened, edited, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check:
    name: Verify PR description changelog block
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR body has a filled-in ## Changelog block
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: bash .github/scripts/check-pr-changelog.sh
