name: Auto Release

on:
  push:
    branches:
      - main

# Serialize release runs so two quick merges don't race on tag creation.
concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Tag minor or patch release
    runs-on: ubuntu-latest
    # Skip the release commit we ourselves push, otherwise this workflow
    # would loop on every release.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_TOKEN is required so the resulting commit and tag pushes
          # bypass the branch restriction and trigger the existing release
          # workflow on tag push.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "teanode-release-bot"
          git config user.email "teanode-release-bot@users.noreply.github.com"

      - name: Run release script
        id: release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: bash .github/scripts/release.sh auto

      - name: Push commit and tag
        if: steps.release.outputs.released == 'true'
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.release.outputs.version }}"
