name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            extension: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            extension: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            extension: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            extension: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            extension: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Generate code
        run: go generate ./internal/models

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA}"
          mkdir -p dist

          go build \
            -ldflags "-s -w -X github.com/teanode/teanode/internal/version.version=${VERSION} -X github.com/teanode/teanode/internal/version.commit=${COMMIT}" \
            -o "dist/teanode${{ matrix.extension }}" .

      - name: Package
        id: package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          fileBasename="teanode_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p package

          cp README.md package/
          if [ -f CHANGELOG.md ]; then
            cp CHANGELOG.md package/
          fi
          if [ -f LICENSE ]; then
            cp LICENSE package/
          fi

          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp "dist/teanode${{ matrix.extension }}" "package/teanode${{ matrix.extension }}"
            (
              cd package
              zip "../${fileBasename}.zip" *
            )
            echo "asset=${fileBasename}.zip" >> "$GITHUB_OUTPUT"
          else
            cp "dist/teanode${{ matrix.extension }}" "package/teanode${{ matrix.extension }}"
            (
              cd package
              tar -czf "../${fileBasename}.tar.gz" *
            )
            echo "asset=${fileBasename}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}

  checksums:
    name: Publish checksums
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        id: checksums
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          checksumFile="teanode_${VERSION}_SHA256SUMS"
          (
            cd release-artifacts
            sha256sum * > "../${checksumFile}"
          )
          echo "checksumFile=${checksumFile}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from changelog
        id: releaseNotes
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          if [ ! -f CHANGELOG.md ]; then
            echo "bodyFile=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          python3 - <<'PY'
from pathlib import Path
import os
import re

version = os.environ["VERSION"]
changelog = Path("CHANGELOG.md").read_text()
pattern = re.compile(r"^## \[" + re.escape(version) + r"\].*$", re.MULTILINE)
match = pattern.search(changelog)
if not match:
    Path("release-notes.md").write_text(f"Release {version}\n")
else:
    start = match.start()
    next_match = re.search(r"^## ", changelog[match.end():], re.MULTILINE)
    end = match.end() + next_match.start() if next_match else len(changelog)
    body = changelog[start:end].strip() + "\n"
    Path("release-notes.md").write_text(body)
PY

          echo "bodyFile=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
            ${{ steps.checksums.outputs.checksumFile }}
          body_path: ${{ steps.releaseNotes.outputs.bodyFile }}
