name: voice-e2e-default
scenarios:
  - id: s1_short
    name: Single short utterance
    description: One short sentence should commit and receive one response.
    timeout_sec: 45
    audio:
      - fixture: short_hello.wav
        expected_text: hello can you summarize what we changed
        delay_before_ms: 200
        delay_after_ms: 1400
    expect:
      min_transcript_similarity: 0.55
      max_response_latency_ms: 4000
      max_response_sentences: 3
      require_barge_in: false
      max_barge_stop_ms: 0

  - id: s2_medium
    name: Single medium utterance
    description: Medium prompt should remain on-topic and concise.
    timeout_sec: 60
    audio:
      - fixture: medium_question.wav
        expected_text: i have two follow up questions about the voice pipeline
        delay_before_ms: 200
        delay_after_ms: 1800
    expect:
      min_transcript_similarity: 0.50
      max_response_latency_ms: 5000
      max_response_sentences: 3
      require_barge_in: false
      max_barge_stop_ms: 0

  - id: s3_long
    name: Long utterance
    description: Long speech should avoid excessive micro-turn splits.
    timeout_sec: 75
    audio:
      - fixture: long_explanation.wav
        expected_text: let me explain the issue and then ask for a concrete next step
        delay_before_ms: 200
        delay_after_ms: 2200
    expect:
      min_transcript_similarity: 0.45
      max_response_latency_ms: 7000
      max_response_sentences: 4
      require_barge_in: false
      max_barge_stop_ms: 0

  - id: s4_multi_turn
    name: Multi-turn conversation
    description: Two turns should preserve context and coherence.
    timeout_sec: 90
    audio:
      - fixture: mt_turn1.wav
        expected_text: first question what changed in the latest patch
        delay_before_ms: 200
        delay_after_ms: 1800
      - fixture: mt_turn2.wav
        expected_text: second question how do i test this end to end
        delay_before_ms: 1000
        delay_after_ms: 2200
    expect:
      min_transcript_similarity: 0.45
      max_response_latency_ms: 7000
      max_response_sentences: 4
      require_barge_in: false
      max_barge_stop_ms: 0

  - id: s5_barge_in
    name: Barge-in interruption
    description: User interruption should stop active response and produce next turn.
    timeout_sec: 90
    audio:
      - fixture: interrupt_q1.wav
        expected_text: explain what this service does
        delay_before_ms: 200
        delay_after_ms: 900
      - fixture: interrupt_followup.wav
        expected_text: stop and tell me only the top risk
        delay_before_ms: 400
        delay_after_ms: 2200
        expect_barge_in: true
    expect:
      min_transcript_similarity: 0.45
      max_response_latency_ms: 7000
      max_response_sentences: 4
      require_barge_in: true
      max_barge_stop_ms: 400

  - id: s6_rapid_interrupt
    name: Rapid interruptions
    description: Two quick interruptions should not deadlock the session.
    timeout_sec: 110
    audio:
      - fixture: rapid_seed.wav
        expected_text: summarize the current status
        delay_before_ms: 200
        delay_after_ms: 700
      - fixture: rapid_interrupt_1.wav
        expected_text: no focus on latency only
        delay_before_ms: 300
        delay_after_ms: 700
        expect_barge_in: true
      - fixture: rapid_interrupt_2.wav
        expected_text: now give one concrete action
        delay_before_ms: 300
        delay_after_ms: 2000
        expect_barge_in: true
    expect:
      min_transcript_similarity: 0.40
      max_response_latency_ms: 8000
      max_response_sentences: 4
      require_barge_in: true
      max_barge_stop_ms: 500
